<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live License Face Scan</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #111827; color: #e5e7eb; }
      .card { max-width: 760px; margin: 0 auto; background: #1f2937; border-radius: 12px; padding: 20px; }
      .stage { position: relative; width: 100%; border-radius: 10px; overflow: hidden; background: black; }
      video { width: 100%; display: block; }
      .overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .mask {
        position: absolute;
        inset: 0;
        background: radial-gradient(closest-side at 50% 45%, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 35%, rgba(0,0,0,0.55) 36%, rgba(0,0,0,0.55) 100%);
      }
      .face-oval {
        position: absolute;
        left: 50%;
        top: 45%;
        width: min(320px, 52vw);
        height: min(420px, 68vw);
        transform: translate(-50%, -50%);
        border: 3px solid rgba(59,130,246,0.9);
        border-radius: 50%;
        box-shadow: 0 0 0 9999px rgba(0,0,0,0.0);
      }
      .guide {
        position: absolute;
        left: 50%;
        top: 10px;
        transform: translateX(-50%);
        background: rgba(15,23,42,0.75);
        border: 1px solid rgba(148,163,184,0.25);
        padding: 10px 12px;
        border-radius: 10px;
        max-width: 92%;
        text-align: center;
        font-weight: 600;
      }
      .arrows {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        width: 92%;
        justify-content: space-between;
        font-size: 44px;
        opacity: 0.0;
        transition: opacity 150ms ease;
        text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      }
      .arrows.show { opacity: 0.95; }
      .arrow {
        width: 60px;
        height: 60px;
        display: grid;
        place-items: center;
        border-radius: 999px;
        background: rgba(15,23,42,0.55);
        border: 1px solid rgba(148,163,184,0.25);
      }
      .row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
      button { border: 0; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: 600; }
      .primary { background: #2563eb; color: white; }
      .muted { background: #374151; color: #f3f4f6; }
      .status { margin-top: 14px; padding: 10px; border-radius: 8px; background: #0f172a; }
      .ok { color: #34d399; }
      .err { color: #f87171; }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(59,130,246,0.16);
        border: 1px solid rgba(59,130,246,0.35);
        margin-left: 8px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Live Driving Licence Scan</h2>
      <p>
        Guided scan with auto-capture: <strong>licence → front → left → right</strong>
        <span class="badge" id="poseBadge">pose: -</span>
      </p>
      <div class="stage">
        <video id="video" autoplay playsinline muted></video>
        <div class="overlay">
          <div class="mask"></div>
          <div class="face-oval"></div>
          <div class="guide" id="guideText">Click “Start Camera”.</div>
          <div class="arrows" id="arrows">
            <div class="arrow" id="arrowLeft">←</div>
            <div class="arrow" id="arrowRight">→</div>
          </div>
        </div>
      </div>
      <div class="row">
        <button id="startBtn" class="primary">Start Camera</button>
        <button id="autoBtn" class="primary" disabled>Start Auto Scan</button>
        <button id="verifyBtn" class="primary" disabled>Verify Identity</button>
        <button id="resetBtn" class="muted">Reset</button>
      </div>
      <div id="status" class="status">Ready.</div>
      <canvas id="canvas" style="display:none"></canvas>
    </div>

    <!-- MediaPipe FaceMesh (more accurate + cross-browser) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
      // Auto capture steps. "license_image" is captured as a still from camera (user shows the card).
      const steps = [
        { key: "license_image", label: "Hold your driving licence inside the oval", targetPose: null },
        { key: "selfie_front", label: "Look straight at the camera", targetPose: "front" },
        { key: "selfie_left", label: "Turn your head LEFT", targetPose: "left" },
        { key: "selfie_right", label: "Turn your head RIGHT", targetPose: "right" },
      ];
      const captured = {};
      let currentStep = 0;
      let stream = null;
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const statusEl = document.getElementById("status");
      const startBtn = document.getElementById("startBtn");
      const autoBtn = document.getElementById("autoBtn");
      const verifyBtn = document.getElementById("verifyBtn");
      const resetBtn = document.getElementById("resetBtn");
      const guideText = document.getElementById("guideText");
      const arrows = document.getElementById("arrows");
      const arrowLeft = document.getElementById("arrowLeft");
      const arrowRight = document.getElementById("arrowRight");
      const poseBadge = document.getElementById("poseBadge");

      let autoRunning = false;
      let lastCaptureAt = 0;
      let stableCount = 0;
      let latestPose = "-";

      // More accurate head-pose estimation with MediaPipe FaceMesh.
      // Runs locally in the browser; no server calls.
      let faceMesh = null;
      let mpCamera = null;
      let hasFace = false;
      let yawSmoothed = 0;
      let lastPoseUpdateAt = 0;
      let yawNeutral = 0;
      let neutralSamples = 0;
      let yawCalibratedSmoothed = 0;

      const POSE_UPDATE_MS = 90; // throttle for performance
      const YAW_ALPHA = 0.35; // smoothing factor
      // thresholds in degrees (after neutral calibration)
      // Slightly relaxed turn threshold for better UX.
      const YAW_FRONT_MAX_DEG = 12;
      const YAW_TURN_MIN_DEG = 14;
      const YAW_FRONT_CAPTURE_DEG = 16;

      function setStatus(text, type) {
        statusEl.textContent = text;
        statusEl.className = "status";
        if (type === "ok") statusEl.classList.add("ok");
        if (type === "err") statusEl.classList.add("err");
      }
      function stepText() {
        return currentStep >= steps.length
          ? "All captures done. Click Verify Identity."
          : `Step ${currentStep + 1}/${steps.length}: ${steps[currentStep].label}`;
      }
      function setGuide(text) {
        guideText.textContent = text;
      }
      function showArrows(mode) {
        // mode: "left" | "right" | "both" | "none"
        arrows.classList.toggle("show", mode !== "none");
        arrowLeft.style.opacity = mode === "left" || mode === "both" ? "1" : "0.2";
        arrowRight.style.opacity = mode === "right" || mode === "both" ? "1" : "0.2";
      }

      function classifyPoseFromYaw(yaw) {
        if (!hasFace) return "no-face";
        if (Math.abs(yaw) <= YAW_FRONT_MAX_DEG) return "front";
        if (yaw >= YAW_TURN_MIN_DEG) return "right";
        if (yaw <= -YAW_TURN_MIN_DEG) return "left";
        return "moving";
      }

      function vsub(a, b) {
        return { x: a.x - b.x, y: a.y - b.y, z: a.z - b.z };
      }
      function vcross(a, b) {
        return {
          x: a.y * b.z - a.z * b.y,
          y: a.z * b.x - a.x * b.z,
          z: a.x * b.y - a.y * b.x,
        };
      }
      function vnorm(a) {
        const n = Math.hypot(a.x, a.y, a.z) + 1e-9;
        return { x: a.x / n, y: a.y / n, z: a.z / n };
      }

      function computeYawDegFromLandmarks(lm) {
        // More robust pose estimate from face plane normal using 3D landmarks.
        // Landmarks (FaceMesh):
        // 33  = left eye outer corner
        // 263 = right eye outer corner
        // 1   = nose tip
        // 152 = chin
        const le = lm[33];
        const re = lm[263];
        const nose = lm[1];
        const chin = lm[152];

        // Build two vectors on the face plane.
        const eyeVec = vsub(re, le);
        const noseToChin = vsub(chin, nose);

        // Face normal (direction depends on coordinate system).
        const n = vnorm(vcross(eyeVec, noseToChin));

        // Convert normal to yaw estimate.
        // In MediaPipe coordinates, z is roughly "towards camera" (often negative),
        // so we use atan2 on x vs z magnitude for stability.
        // Flip sign to match user-facing (mirrored) camera expectation:
        // turning your head LEFT should produce "left".
        const yawRad = Math.atan2(-n.x, Math.abs(n.z) + 1e-6);
        return (yawRad * 180) / Math.PI;
      }

      async function startCamera() {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
          video.srcObject = stream;
          autoBtn.disabled = false;
          setStatus("Camera started. Click “Start Auto Scan”.");
          setGuide("Align the licence/face inside the oval.");

          // Init FaceMesh once camera starts.
          if (!faceMesh) {
            faceMesh = new FaceMesh.FaceMesh({
              locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`,
            });
            faceMesh.setOptions({
              maxNumFaces: 1,
              refineLandmarks: false,
              minDetectionConfidence: 0.6,
              minTrackingConfidence: 0.6,
            });
            faceMesh.onResults((results) => {
              const now = Date.now();
              if (now - lastPoseUpdateAt < POSE_UPDATE_MS) return;
              lastPoseUpdateAt = now;

              const faces = results.multiFaceLandmarks || [];
              hasFace = faces.length === 1;
              if (!hasFace) {
                latestPose = "no-face";
                poseBadge.textContent = "pose: no-face";
                stableCount = 0;
                return;
              }

              const yawDeg = computeYawDegFromLandmarks(faces[0]);
              yawSmoothed = yawSmoothed * (1 - YAW_ALPHA) + yawDeg * YAW_ALPHA;

              // Neutral calibration when the user is supposed to be front.
              const step = steps[currentStep];
              if (step && step.targetPose === "front" && neutralSamples < 18) {
                yawNeutral = yawNeutral * 0.7 + yawSmoothed * 0.3;
                neutralSamples += 1;
              }

              const yawCalibrated = yawSmoothed - yawNeutral;
              yawCalibratedSmoothed = yawCalibratedSmoothed * (1 - YAW_ALPHA) + yawCalibrated * YAW_ALPHA;
              latestPose = classifyPoseFromYaw(yawCalibrated);
              poseBadge.textContent = `pose: ${latestPose} (yaw ${yawCalibratedSmoothed.toFixed(0)}°)`;
            });
          }

          // Use MediaPipe camera utils to feed frames into FaceMesh.
          if (!mpCamera) {
            mpCamera = new Camera(video, {
              onFrame: async () => {
                if (!faceMesh) return;
                // Send full frame; FaceMesh is already optimized and we throttle results.
                await faceMesh.send({ image: video });
              },
              width: 640,
              height: 480,
            });
            mpCamera.start();
          }
        } catch {
          setStatus("Camera permission denied or unavailable.", "err");
        }
      }

      function captureFrame() {
        if (!stream || currentStep >= steps.length) return false;
        canvas.width = video.videoWidth || 1280;
        canvas.height = video.videoHeight || 720;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(
          (blob) => {
            if (!blob) return setStatus("Failed to capture frame.", "err");
            const step = steps[currentStep];
            captured[step.key] = new File([blob], `${step.key}.jpg`, { type: "image/jpeg" });
            currentStep += 1;
            stableCount = 0;
            lastCaptureAt = Date.now();

            if (currentStep >= steps.length) {
              autoRunning = false;
              autoBtn.textContent = "Start Auto Scan";
              verifyBtn.disabled = false;
              setStatus("All required scans captured. Click Verify Identity.", "ok");
              setGuide("All captures complete.");
              showArrows("none");
            } else {
              setStatus(stepText());
              const next = steps[currentStep];
              if (next.targetPose === "left") showArrows("left");
              else if (next.targetPose === "right") showArrows("right");
              else showArrows("none");
              setGuide(next.label);
            }
          },
          "image/jpeg",
          0.95
        );
        return true;
      }

      async function estimatePose() {
        // Pose is continuously updated by FaceMesh. This function is kept for flow control.
        return latestPose || "-";
      }

      async function autoLoop() {
        if (!autoRunning) return;
        if (!stream || currentStep >= steps.length) return;

        const step = steps[currentStep];
        latestPose = await estimatePose();

        // Licence capture: just wait a moment and capture once user is steady.
        if (step.key === "license_image") {
          showArrows("none");
          setGuide(step.label);
          const now = Date.now();
          if (now - lastCaptureAt > 900) {
            stableCount += 1;
            if (stableCount >= 8) captureFrame();
          }
          requestAnimationFrame(autoLoop);
          return;
        }

        // Face steps: require pose match for some consecutive frames.
        if (step.targetPose === "left") showArrows("left");
        else if (step.targetPose === "right") showArrows("right");
        else showArrows("none");
        setGuide(step.label);

        // Use yaw directly for more reliable "front" detection.
        if (step.targetPose === "front") {
          if (hasFace && Math.abs(yawCalibratedSmoothed) <= YAW_FRONT_CAPTURE_DEG) stableCount += 1;
          else stableCount = 0;
        } else {
          if (latestPose === step.targetPose) stableCount += 1;
          else stableCount = 0;
        }

        // 12 frames of stability + 900ms between captures.
        const now = Date.now();
        if (stableCount >= 12 && now - lastCaptureAt > 900) {
          captureFrame();
        }
        requestAnimationFrame(autoLoop);
      }

      function startAuto() {
        if (!stream) return;
        if (currentStep >= steps.length) return;
        autoRunning = !autoRunning;
        autoBtn.textContent = autoRunning ? "Stop Auto Scan" : "Start Auto Scan";
        setStatus(autoRunning ? "Auto scan running…" : "Auto scan stopped.");
        stableCount = 0;
        lastCaptureAt = Date.now();
        if (autoRunning) autoLoop();
      }

      async function verifyIdentity() {
        const form = new FormData();
        for (const step of steps) {
          if (!captured[step.key]) return setStatus(`Missing capture: ${step.label}`, "err");
          form.append(step.key, captured[step.key]);
        }
        form.append("threshold", "0.55");
        const res = await fetch("/api/verify-license", { method: "POST", body: form });
        const data = await res.json();
        if (!res.ok) return setStatus(`Verification failed: ${data?.error || "Unknown error"}`, "err");
        setStatus(`Final decision: ${data.final_decision || "unknown"}`, "ok");
      }
      function resetFlow() {
        for (const key of Object.keys(captured)) delete captured[key];
        currentStep = 0;
        verifyBtn.disabled = true;
        autoRunning = false;
        autoBtn.textContent = "Start Auto Scan";
        autoBtn.disabled = !stream;
        setStatus(stream ? "Camera ready. Click “Start Auto Scan”." : "Ready.");
        setGuide(stream ? "Align the licence/face inside the oval." : "Click “Start Camera”.");
        showArrows("none");
        poseBadge.textContent = "pose: -";
      }
      startBtn.addEventListener("click", startCamera);
      autoBtn.addEventListener("click", startAuto);
      verifyBtn.addEventListener("click", verifyIdentity);
      resetBtn.addEventListener("click", resetFlow);
    </script>
  </body>
</html>
